on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      TMPDIR: /mnt/tmp
      PRE_COMMIT_HOME: /mnt/pre-commit-cache
    steps:
      - uses: actions/checkout@v4

      - name: Prepare temp/cache directories on /mnt
        run: |
          sudo mkdir -p "$TMPDIR" "$PRE_COMMIT_HOME"
          sudo chown "$USER":"$USER" "$TMPDIR" "$PRE_COMMIT_HOME"
          df -h /
          df -h /mnt

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"

      - name: Sync dev dependencies
        run: uv sync --group dev

      - name: Run lint
        run: uv run pre-commit run --all-files

  unit_tests:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - test-suite: analysis
            extras: ""
          - test-suite: evaluation
            extras: "--extra pyserini"
            needs-java: true
          - test-suite: rerank
            extras: "--extra cloud --extra vllm"
    env:
      TMPDIR: /mnt/tmp
    steps:
      - uses: actions/checkout@v4

      - name: Prepare temp directory on /mnt
        run: |
          sudo mkdir -p "$TMPDIR"
          sudo chown "$USER":"$USER" "$TMPDIR"
          df -h /
          df -h /mnt

      - uses: actions/setup-java@v3
        if: ${{ matrix.needs-java }}
        with:
          distribution: "temurin"
          java-version: "21"

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"

      - name: Sync test environment
        run: uv sync --group dev ${{ matrix.extras }}

      - name: Run tests
        run: uv run python -m unittest discover -s "test/${{ matrix.test-suite }}"
